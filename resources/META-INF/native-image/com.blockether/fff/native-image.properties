# GraalVM native-image configuration for com.blockether/fff.
# Auto-applied when this jar is on the native-image classpath. Pairs with the
# reachability-metadata.json in this directory (the FFM downcall stubs).
#
# Why each flag:
#   --enable-native-access      the binding loads libfff_c via SymbolLookup.
#                               libraryLookup and builds downcall handles through
#                               the Foreign Function & Memory API.
#   ForeignAPISupport           enables the FFM downcall stubs in the image.
#
# NO -H:+SharedArenaSupport: com.blockether.fff/bind! uses Arena.ofAuto (long-
# lived, GC-managed) for the library lookup and Arena.ofConfined (per-call) for
# each operation — NEVER Arena.ofShared, which is INCOMPATIBLE with Truffle
# runtime compilation (an image that also embeds GraalPy fails with
# "Arena.ofShared is not supported with runtime compilations").
#
# The native library loads at RUN TIME from FFF_NATIVE_PATH, the bundled
# prebuilds/<platform>/ resource, or — on a plain JVM only — the tools.deps
# download cache. In a native image bundle the matching
# com.blockether/fff-native-<platform> jar OR set FFF_NATIVE_PATH.
Args = --enable-native-access=ALL-UNNAMED \
       -H:+UnlockExperimentalVMOptions \
       -H:+ForeignAPISupport
